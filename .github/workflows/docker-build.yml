name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sitetour:latest

  deploy:

    needs: docker

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::113831183996:role/SiteTour-github-actions-deploy-role
          aws-region: ap-northeast-1

      - name: Deploy via SSM
        run: |
          COMPOSE_CONTENT=$(base64 -w 0 deploy/docker-compose.yml)
          DEPLOY_SCRIPT_CONTENT=$(base64 -w 0 deploy/deploy.sh)
          NGINX_CONFIG_CONTENT=$(base64 -w 0 deploy/nginx/default.conf)
          
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:App,Values=sitetour" "Name=tag:Env,Values=dev" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          
          echo "Deploy target instance: $INSTANCE_ID"
          
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"mkdir -p /home/ubuntu/deploy\",
              \"rm -rf /home/ubuntu/deploy/nginx/default.conf\",
              \"mkdir -p /home/ubuntu/deploy/nginx\",
              \"echo $NGINX_CONFIG_CONTENT | base64 -d > /home/ubuntu/deploy/nginx/default.conf\",
              \"echo $COMPOSE_CONTENT | base64 -d > /home/ubuntu/deploy/docker-compose.yml\",
              \"echo $DEPLOY_SCRIPT_CONTENT | base64 -d > /home/ubuntu/deploy/deploy.sh\",
              \"printf '%s\n' 'POSTGRES_DB=${{ secrets.POSTGRES_DB }}' 'POSTGRES_USER=${{ secrets.POSTGRES_USER }}' 'POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}' 'SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}' 'SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}' 'SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}' > /home/ubuntu/deploy/.env\",
              \"chmod +x /home/ubuntu/deploy/deploy.sh\",
              \"chown -R ubuntu:ubuntu /home/ubuntu/deploy\",
              \"echo '${{ secrets.GHCR_TOKEN }}' | sudo docker login ghcr.io -u realswagner --password-stdin\",
              \"bash /home/ubuntu/deploy/deploy.sh\"
            ]" \
            --query "Command.CommandId" \
            --output text)
          
          echo "SSM Command ID: $COMMAND_ID"
          
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"