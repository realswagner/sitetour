name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sitetour:latest

  deploy:

    needs: docker

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::113831183996:role/SiteTour-github-actions-deploy-role
          aws-region: ap-northeast-1

      - name: Deploy via SSM
        run: |
          COMPOSE_CONTENT=$(base64 -w 0 deploy/docker-compose.yml)
          DEPLOY_SCRIPT_CONTENT=$(base64 -w 0 deploy/deploy.sh)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-04866771c489ae4a6" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"mkdir -p /home/ubuntu/deploy\",
              \"echo $COMPOSE_CONTENT | base64 -d > /home/ubuntu/deploy/docker-compose.yml\",
              \"echo $DEPLOY_SCRIPT_CONTENT | base64 -d > /home/ubuntu/deploy/deploy.sh\",
              \"chmod +x /home/ubuntu/deploy/deploy.sh\",
              \"bash /home/ubuntu/deploy/deploy.sh\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-04866771c489ae4a6"