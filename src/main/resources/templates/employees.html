<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>社員一覧</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <h1 class="page-title">社員一覧</h1>

    <div class="section-card">

        <form method="get" action="/employees">

            <div style="display:flex; gap:15px; flex-wrap:wrap;">

                <select name="teamId" th:if="${isAdmin}">

                    <option value="">全チーム</option>

                    <option
                            th:each="team : ${teams}"
                            th:value="${team.id}"
                            th:text="${team.name}">
                    </option>

                </select>
                <div th:unless="${isAdmin}">
                </div>

                <select name="status">

                    <option value="">全ステータス</option>

                    <option value="NOT_CONTACTED">未連絡</option>
                    <option value="CONTACTING">連絡中</option>
                    <option value="AWAITING_REPLY">返信待ち</option>
                    <option value="SCHEDULED">予定確定</option>
                    <option value="COMPLETED">完了</option>

                </select>

                <button class="logout-btn" type="submit">
                    絞り込み
                </button>

            </div>

        </form>

    </div>

    <div th:unless="${isAdmin}"
         class="section-card">

        <a href="/employees/new"
           class="logout-btn"
           style="text-decoration:none;">
            ＋ 社員登録
        </a>

    </div>

    <div class="section-card">

        <table class="employee-table">

            <thead>

            <tr>

                <th>氏名</th>
                <th>メール</th>
                <th>電話番号</th>
                <th>サイト</th>
                <th>状況</th>
                <th th:if="${isAdmin}">
                    チーム
                </th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="employee : ${employees}">

                <td>

                    <a th:href="@{'/employees/' + ${employee.id}}"
                       th:text="${employee.name}"
                       class="employee-link">
                    </a>

                </td>

                <td th:text="${employee.email}"></td>

                <td th:text="${employee.phoneNumber}"></td>

                <td th:text="${employee.siteLocation}"></td>

                <td>

                    <span th:switch="${employee.status.name()}">

                    <span th:case="'NOT_CONTACTED'">未連絡</span>

                     <span th:case="'CONTACTING'">連絡中</span>

                     <span th:case="'AWAITING_REPLY'">返信待ち</span>

                    <span th:case="'SCHEDULED'">予定確定</span>

                    <span th:case="'COMPLETED'">完了</span>

                    </span>

                </td>

                <td
                        th:if="${isAdmin}" th:text="${employee.team != null ? employee.team.name : '-'}">
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
