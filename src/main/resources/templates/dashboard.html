<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>サイトツアーダッシュボード</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <h1 class="page-title">サイトツアーダッシュボード</h1>

    <div class="user-info">
        <div>
            <strong>ログインユーザー：</strong>
            <span th:text="${username}"></span>
        </div>

        <div style="margin-top:8px;">
        <span th:if="${isAdmin}">
            管理者モード
        </span>

            <span th:unless="${isAdmin}">
            チームモード
        </span>
        </div>
    </div>

    <!-- Today's interviews -->

    <div class="section-card">

        <h2>本日のインタビュー予定</h2>

        <div th:if="${#lists.isEmpty(todaysInterviews)}">
            本日の予定はありません。
        </div>

        <div th:unless="${#lists.isEmpty(todaysInterviews)}">

            <div th:each="employee : ${todaysInterviews}"
                 style="padding:10px 0;border-bottom:1px solid #eee;">

                <strong th:text="${employee.name}"></strong>

                <span>
                （
                <span th:text="${employee.interviewTime}"></span>
                ）
            </span>

            </div>

        </div>

    </div>

    <!-- admin specific status cards for each team-->
    <div th:if="${isAdmin}">

        <h2 style="margin-bottom:15px;">
            チーム別進捗状況
        </h2>

        <div class="team-dashboard-grid">

            <div class="team-dashboard-card"
                 th:each="teamStat : ${teamStats}">

                <h3 th:text="${teamStat.team.name}">
                    Team
                </h3>

                <div class="team-stat-row">
                    <span>未連絡</span>
                    <strong th:text="${teamStat.stats.notContacted}"></strong>
                </div>

                <div class="team-stat-row">
                    <span>連絡中</span>
                    <strong th:text="${teamStat.stats.contacting}"></strong>
                </div>

                <div class="team-stat-row">
                    <span>返信待ち</span>
                    <strong th:text="${teamStat.stats.awaitingReply}"></strong>
                </div>

                <div class="team-stat-row">
                    <span>日程確定</span>
                    <strong th:text="${teamStat.stats.scheduled}"></strong>
                </div>

                <div class="team-stat-row">
                    <span>完了</span>
                    <strong th:text="${teamStat.stats.completed}"></strong>
                </div>

                <div class="team-stat-total">

                    合計：
                    <span th:text="${teamStat.stats.notContacted
                         + teamStat.stats.contacting
                         + teamStat.stats.awaitingReply
                         + teamStat.stats.scheduled
                         + teamStat.stats.completed}">
                </span>

                </div>

                <a th:href="@{/employees(teamId=${teamStat.team.id})}"
                   class="action-btn"
                   style="margin-top:15px; display:inline-block;">

                    社員一覧

                </a>

            </div>

        </div>

    </div>

    <!-- Status cards -->

    <div class="stats-container">

        <a class="stat-link"
           href="/employees?status=NOT_CONTACTED">

            <div class="stat-card">

                <div class="stat-title">
                    未連絡
                </div>

                <div class="stat-number"
                     th:text="${stats.notContacted}">
                </div>

            </div>

        </a>

        <a class="stat-link"
           href="/employees?status=CONTACTING">

            <div class="stat-card">

                <div class="stat-title">
                    連絡中
                </div>

                <div class="stat-number"
                     th:text="${stats.contacting}">
                </div>

            </div>

        </a>

        <a class="stat-link"
           href="/employees?status=AWAITING_REPLY">

            <div class="stat-card">

                <div class="stat-title">
                    返信待ち
                </div>

                <div class="stat-number"
                     th:text="${stats.awaitingReply}">
                </div>

            </div>

        </a>

        <a class="stat-link"
           href="/employees?status=SCHEDULED">

            <div class="stat-card">

                <div class="stat-title">
                    日程確定
                </div>

                <div class="stat-number"
                     th:text="${stats.scheduled}">
                </div>

            </div>

        </a>

        <a class="stat-link"
           href="/employees?status=COMPLETED">

            <div class="stat-card">

                <div class="stat-title">
                    完了
                </div>

                <div class="stat-number"
                     th:text="${stats.completed}">
                </div>

            </div>

        </a>

    </div>

    <br>

    <form action="/logout" method="post">

        <input
                type="hidden"
                th:name="${_csrf.parameterName}"
                th:value="${_csrf.token}" />

        <button type="submit" class="logout-btn">
            ログアウト
        </button>

    </form>

</div>

</body>
</html>
