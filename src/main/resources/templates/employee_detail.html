<!DOCTYPE html>
<!-- update employee page -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Detail</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <div th:if="${errorMessage}"
         class="error-banner"
         th:text="${errorMessage}">
    </div>

    <div th:if="${successMessage}"
         class="success-banner"
         th:text="${successMessage}">
    </div>

    <h1 class="page-title">社員詳細</h1>

    <div class="section-card">

        <h2 th:text="${employee.name}"></h2>
        <div style="margin-bottom:20px;">

            <a th:unless="${isAdmin}"
               th:href="@{'/employees/' + ${employee.id} + '/edit'}"
               class="action-btn">

                編集

            </a>

        </div>

        <p><strong>メール:</strong>
            <span th:text="${employee.email}"></span>
        </p>
        <p><strong>電話番号:</strong>
            <span th:text="${employee.phoneNumber}"></span>
        </p>

        <p><strong>現場:</strong>
            <span th:text="${employee.siteLocation}"></span>
        </p>

        <p>
            <strong>ステータス:</strong>

            <span th:switch="${employee.status.name()}">

                <span th:case="'NOT_CONTACTED'">未連絡</span>
                <span th:case="'CONTACTING'">連絡中</span>
                <span th:case="'AWAITING_REPLY'">返信待ち</span>
                <span th:case="'SCHEDULED'">予定確定</span>
                <span th:case="'COMPLETED'">完了</span>

            </span>

        </p>

    </div>

    <div class="section-card">

        <h2>インタビュー情報</h2>

        <p>
            <strong>候補日 / メモ：</strong>
            <span th:text="${employee.proposedDates}"></span>
        </p>

        <p>
            <strong>インタビュー日:</strong>
            <span th:text="${employee.interviewDate}"></span>
        </p>

        <p>
            <strong>インタビュー時間:</strong>
            <span th:text="${employee.interviewTime}"></span>
        </p>

        <p>
            <strong>Zoom URL:</strong>
            <span th:text="${employee.zoomLink}"></span>
        </p>

    </div>

    <div class="section-card" th:unless="${isAdmin}">

        <h2>進捗更新</h2>

        <form action="/employees/update-status" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <input type="hidden"
                   name="id"
                   th:value="${employee.id}">

            <div class="form-group">

                <select name="status">

                    <option value="NOT_CONTACTED"
                            th:selected="${employee.status.name() == 'NOT_CONTACTED'}">
                        未連絡
                    </option>

                    <option value="CONTACTING"
                            th:selected="${employee.status.name() == 'CONTACTING'}">
                        連絡中
                    </option>

                    <option value="AWAITING_REPLY"
                            th:selected="${employee.status.name() == 'AWAITING_REPLY'}">
                        返信待ち
                    </option>

                    <option value="SCHEDULED"
                            th:selected="${employee.status.name() == 'SCHEDULED'}">
                        予定確定
                    </option>

                    <option value="COMPLETED"
                            th:selected="${employee.status.name() == 'COMPLETED'}">
                        完了
                    </option>

                </select>

            </div>

            <button type="submit"
                    class="logout-btn">
                更新
            </button>

        </form>

    </div>

    <div class="section-card">

        <div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
">

            <h2 style="margin:0;">
                パーソナルレポート
            </h2>

            <button type="button"
                    id="report-btn"
                    class="logout-btn toggle-btn"
                    onclick="toggleReport()">

                開く

            </button>

        </div>

        <div th:if="${card != null}">
            <div id="report-content"
                 style="display:none;">

            <div class="report-block">

                <div class="report-question">
                    質問①
                </div>

                <div class="report-answer"
                     th:text="${card.question1}">
                </div>

            </div>

            <div class="report-block">

                <div class="report-question">
                    回答①
                </div>

                <div class="report-answer"
                     th:text="${card.answer1}">
                </div>

            </div>

            <div class="report-block">

                <div class="report-question">
                    質問②
                </div>

                <div class="report-answer"
                     th:text="${card.question2}">
                </div>

            </div>

            <div class="report-block">

                <div class="report-question">
                    回答②
                </div>

                <div class="report-answer"
                     th:text="${card.answer2}">
                </div>

            </div>

            <div class="report-block">

                <div class="report-question">
                    質問③
                </div>

                <div class="report-answer"
                     th:text="${card.question3}">
                </div>

            </div>

            <div class="report-block">

                <div class="report-question">
                    回答③
                </div>

                <div class="report-answer"
                     th:text="${card.answer3}">
                </div>

            </div>

            <div class="report-block">

                <div class="report-question">
                    質問④
                </div>

                <div class="report-answer"
                     th:text="${card.question4}">
                </div>

            </div>

            <div class="report-block">

                <div class="report-question">
                    回答④
                </div>

                <div class="report-answer"
                     th:text="${card.answer4}">
                </div>
            </div>

            <div class="report-block">

                <div class="report-question">
                    質問⑤
                </div>

                <div class="report-answer"
                     th:text="${card.question5}">
                </div>

            </div>

            <div class="report-block">

                <div class="report-question">
                    回答⑤
                </div>

                <div class="report-answer"
                     th:text="${card.answer5}">
                </div>
            </div>


            <div class="report-block">

                <div class="report-question">
                    所感
                </div>

                <div class="report-answer"
                     th:text="${card.impressions}">
                </div>

            </div>

        </div>
        </div>
        <div class="action-buttons"
             th:if="${card != null}">

            <a th:href="@{'/interviewcards#card-' + ${card.id}}"
               class="action-btn">

                パーソナルレポートを編集

            </a>

        </div>

    </div>

    <div class="action-buttons">

        <a href="/employees"
           class="action-btn-secondary">

            ← 一覧へ戻る

        </a>

    </div>

    <div class="section-card">

        <h3 style="color:#d9534f;">
            社員削除
        </h3>

        <form th:action="@{/employees/delete}"
              method="post"
              onsubmit="return confirm('削除しますか？');">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <input type="hidden"
                   name="id"
                   th:value="${employee.id}" />

            <div class="form-group">

                <label>

                    削除するには社員名を入力してください

                </label>

                <input type="text"
                       name="confirmName"
                       th:placeholder="${employee.name}"
                       required>

            </div>

            <button type="submit"
                    class="logout-btn"
                    style="background:#d9534f;">

                削除

            </button>

        </form>

    </div>

</div>
<script>
function toggleReport() {

const report =
document.getElementById("report-content");

const button =
document.getElementById("report-btn");

const opening =
report.style.display === "none"
|| report.style.display === "";

if (opening) {

report.style.display = "block";

button.classList.add("active");

button.textContent = "閉じる";

} else {

report.style.display = "none";

button.classList.remove("active");

button.textContent = "開く";
}
}
</script>
</body>
</html>
