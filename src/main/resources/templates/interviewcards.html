<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Interview Cards</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">
    <h1 class="page-title">
        パーソナルレポート
    </h1>
    <div th:if="${errorMessage}"
         class="error-banner"
         th:text="${errorMessage}">
    </div>

    <div th:if="${successMessage}"
         class="success-banner"
         th:text="${successMessage}">
    </div>

<div th:each="card : ${cards}"
     class="interview-card"
     th:id="'card-' + ${card.id}">
    <div class="interview-header">

        <div>

        <span class="interview-name"
              th:text="${card.employee.name}">
        </span>

            -

            <span th:text="${#temporals.format(
                card.employee.interviewDate,
                'yyyy/MM/dd'
        )}">
        </span>

        </div>

        <button type="button"
                class="logout-btn toggle-btn"
                th:id="'card-btn-' + ${card.id}"
                th:attr="onclick='toggleCard(' + ${card.id} + ')'">

            開く

        </button>

    </div>

    <form action="/interviewcards/update" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <input type="hidden"
               name="id"
               th:value="${card.id}">
        <div th:id="'card-content-' + ${card.id}"
             style="display:none;">

        <div class="question-block">

            <div class="question-title">
                質問①
            </div>

            <input type="text"
                   name="question1"
                   th:value="${card.question1}">

        </div>

        <div class="question-block">

            <div class="question-title">
                回答①
            </div>

            <textarea class="answer-area"
                      name="answer1"
                      th:text="${card.answer1}">
    </textarea>

        </div>

        <div class="question-block">

            <div class="question-title">
                質問②
            </div>

            <input type="text"
                   name="question2"
                   th:value="${card.question2}">

        </div>

        <div class="question-block">

            <div class="question-title">
                回答②
            </div>

            <textarea class="answer-area"
                      name="answer2"
                      th:text="${card.answer2}">
    </textarea>

        </div>

        <div class="question-block">

            <div class="question-title">
                質問③
            </div>

            <input type="text"
                   name="question3"
                   th:value="${card.question3}">

        </div>

        <div class="question-block">

            <div class="question-title">
                回答③
            </div>

            <textarea class="answer-area"
                      name="answer3"
                      th:text="${card.answer3}">
    </textarea>

        </div>

        <div class="question-block">

            <div class="question-title">
                質問④
            </div>

            <input type="text"
                   name="question4"
                   th:value="${card.question4}">

        </div>

        <div class="question-block">

            <div class="question-title">
                回答④
            </div>

            <textarea class="answer-area"
                      name="answer4"
                      th:text="${card.answer4}">
    </textarea>

        </div>

        <div class="question-block">

            <div class="question-title">
                質問⑤
            </div>

            <input type="text"
                   name="question5"
                   th:value="${card.question5}">

        </div>

        <div class="question-block">

            <div class="question-title">
                回答⑤
            </div>

            <textarea class="answer-area"
                      name="answer5"
                      th:text="${card.answer5}">
    </textarea>

        </div>

        <div class="question-title">
            所感
        </div>
        <textarea class="answer-area"
                  name="impressions"
                  th:text="${card.impressions}">
        </textarea>

        <br><br>

        <div class="save-row">

            <button type="submit"
                    class="logout-btn">

                保存

            </button>

        </div>
        </div>
    </form>

</div>
</div>

<script>

    function toggleCard(cardId) {

        const card =
            document.getElementById(
                "card-content-" + cardId
            );

        const button =
            document.getElementById(
                "card-btn-" + cardId
            );

        const opening =
            card.style.display === "none"
            || card.style.display === "";

        if (opening) {

            card.style.display = "block";

            button.classList.add("active");

            button.textContent = "閉じる";

        } else {

            card.style.display = "none";

            button.classList.remove("active");

            button.textContent = "開く";
        }
    }
</script>
</body>
</html>
