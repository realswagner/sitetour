<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>インタビュースケジュール</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <h1 class="page-title">
        インタビュースケジュール
    </h1>
    <div th:unless="${groupedSchedules.isEmpty()}"
         class="section-card">

        <strong>日付へ移動：</strong>

        <span th:each="entry : ${groupedSchedules}"
              style="margin-right:15px;">

        <a th:href="'#date-' + ${entry.key}"
           class="employee-link"
           th:text="${#temporals.format(entry.key,'MM/dd')}">
        </a>

    </span>

    </div>

    <div class="section-card">

        <div th:if="${groupedSchedules.isEmpty()}">

            <p>
                予定されているインタビューはありません。
            </p>

        </div>

        <div th:each="entry : ${groupedSchedules}"
             class="section-card"
             th:id="'date-' + ${entry.key}">

            <h2 th:text="${entry.key}">
                Date
            </h2>

            <div th:each="emp : ${entry.value}"
                 style="margin-top:15px;">

                <h3 th:text="${emp.name}"></h3>

                <p>
                    <strong>時間：</strong>
                    <span th:text="${emp.interviewTime}">
            </span>
                </p>

                <p>
                    <strong>サイト：</strong>
                    <span th:text="${emp.siteLocation}">
            </span>
                </p>
                <p>

                    <strong>状況：</strong>

                    <span th:if="${emp.status.name() == 'SCHEDULED'}"
                          class="status-scheduled">

        予定確定

    </span>

                    <span th:if="${emp.status.name() == 'COMPLETED'}"
                          class="status-completed">

        完了

    </span>

                </p>

                <a th:href="@{'/employees/' + ${emp.id}}"
                   class="action-btn-secondary">
                    詳細を見る
                </a>

                <div style="height:15px;"></div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
