
<!DOCTYPE html> <html xmlns:th="http://www.thymeleaf.org"> <head> <title>Admin Dashboard</title> <link rel="stylesheet" th:href="@{/css/style.css}"> </head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <h1 class="page-title">
        管理者パネル
    </h1>
    <!-- error alert -->
    <div th:if="${param.error}"
         style="color:red; margin-bottom:15px;">

        パスワードが一致しません

    </div>
    <!-- password reset success message-->
    <div th:if="${param.success}"
         style="color:green; margin-bottom:15px;">

        パスワードを変更しました

    </div>

    <div class="section-card">

        <h2>チーム作成</h2>

        <form action="/admin/teams/create" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <div class="form-group">
                <label>チーム名</label>
                <input type="text"
                       name="teamName"
                       required>
            </div>

            <div class="form-group">
                <label>ログインID</label>
                <input type="text"
                       name="username"
                       required>
            </div>

            <div class="form-group">
                <label>パスワード</label>
                <input type="password"
                       name="password"
                       required>
            </div>
            <div class="form-group">
                <label>パスワード確認</label>

                <input type="password"
                       name="confirmPassword"
                       required>
            </div>

            <button type="submit"
                    class="logout-btn">
                チーム作成
            </button>

        </form>

    </div>

    <div class="section-card">

        <h2>チーム一覧</h2>

        <div th:each="team : ${teams}"
             class="section-card"
             style="margin-bottom:15px; padding:20px;">

            <h3 th:text="${team.name}">
                Team Name
            </h3>

            <p>
                Login ID:
                <strong
                        th:text="${teamLogins[team.id]}">
                </strong>
            </p>

            <p style="color:#777; margin-top:-5px;">
                ID:
                <span th:text="${team.id}"></span>
            </p>

            <form action="/admin/teams/update-notes"
                  method="post">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <input type="hidden"
                       name="teamId"
                       th:value="${team.id}" />

                <div class="form-group">

                    <label>
                        チームメンバー / メモ
                    </label>

                    <textarea
                            name="memberNotes"
                            rows="3"
                            style="width:100%;"
                            th:text="${team.memberNotes}">
        </textarea>

                </div>

                <button type="submit"
                        class="logout-btn">

                    メモ保存

                </button>

            </form>

            <hr>

            <h4 style="margin-top:15px;">
                チーム名変更
            </h4>

            <form action="/admin/teams/rename"
                  method="post"
                  style="display:flex; gap:10px;">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <input type="hidden"
                       name="teamId"
                       th:value="${team.id}" />

                <input type="text"
                       name="teamName"
                       th:value="${team.name}"
                       required>

                <button type="submit"
                        class="logout-btn">

                    名前変更

                </button>

            </form>
            <h4>ログインID変更</h4>

            <form action="/admin/teams/update-login"
                  method="post">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <input type="hidden"
                       name="teamId"
                       th:value="${team.id}" />

                <input type="text"
                       name="username"
                       th:value="${teamLogins[team.id]}"
                       required>

                <button type="submit"
                        class="logout-btn">

                    ログインID変更

                </button>

            </form>

            <h4>パスワード変更</h4>

            <form action="/admin/teams/reset-password"
                  method="post">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <input type="hidden"
                       name="teamId"
                       th:value="${team.id}" />

                <div style="display:flex; gap:10px;">

<!--                    <label>新しいパスワード</label>-->

                    <input type="password"
                           name="password"
                           placeholder="新しいパスワード"
                           required>

                </div>

                <div class="form-group">

<!--                    <label>確認</label>-->

                    <input type="password"
                           name="confirmPassword"
                           placeholder="新しいパスワード確認"
                           required>

                </div>

                <button type="submit"
                        class="logout-btn">

                    パスワード変更

                </button>

            </form>

            <br>

            <h4 style="margin-top:15px; color:#d9534f;">
                チーム削除
            </h4>

            <form action="/admin/teams/delete"
                  method="post"
                  onsubmit="return confirmDelete(this);"
                  th:attr="data-team-name=${team.name}">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <input type="hidden"
                       name="teamId"
                       th:value="${team.id}" />

                <input type="text"
                       name="confirmName"
                       placeholder="チーム名を入力"
                       required>

                <button type="submit"
                        class="logout-btn"
                        style="background:#d9534f;">

                    削除

                </button>

            </form>

        </div>

    </div>

</div>
<script>

    function confirmDelete(form) {

        const teamName =
            form.dataset.teamName;

        const entered =
            form.confirmName.value;

        if (entered !== teamName) {

            alert("チーム名が一致しません");

            return false;
        }

        return confirm(
            teamName + " を本当に削除しますか？"
        );
    }

</script>
</body>
</html>
