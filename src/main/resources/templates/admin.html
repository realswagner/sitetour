<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>管理パネル</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="admin-content">
<div class="admin-nav-grid">

    <a class="admin-nav-card"
       href="/admin/teams">

        <h3>チーム管理</h3>
        <p>
            チーム・ユーザー管理
        </p>

    </a>

    <a class="admin-nav-card"
       href="/admin/auditlogs">

        <h3>監査ログ</h3>
        <p>
            システム操作履歴
        </p>

    </a>

    <a class="admin-nav-card"
       href="/admin/schedules">

        <h3>面談スケジュール</h3>
        <p>
            全チーム予定確認
        </p>

    </a>

</div>

    <div class="section-card">

        <h2>
            最近のアクティビティ
        </h2>

        <div th:each="log : ${recentLogs}"
             style="padding:8px 0; border-bottom:1px solid #eee;">

            <strong th:text="${log.action}">
            </strong>

            <br>

            <span th:text="${log.details}">
    </span>

        </div>

    </div>
    <div class="section-card">

        <h2>データ出力</h2>

        <form action="/admin/export/employees"
              method="get">

            <select name="teamId">

                <option value="">
                    全チーム
                </option>

                <option th:each="team : ${teams}"
                        th:value="${team.id}"
                        th:text="${team.name}">
                </option>

            </select>

            <button type="submit"
                    class="logout-btn">

                CSV出力

            </button>

        </form>

        <form action="/admin/export/employees/excel"
              method="get">

            <select name="teamId">

                <option value="">
                    全チーム
                </option>

                <option th:each="team : ${teams}"
                        th:value="${team.id}"
                        th:text="${team.name}">
                </option>

            </select>

            <button type="submit"
                    class="logout-btn">

                Excel出力

            </button>

        </form>

    </div>

    <div class="section-card">

        <h2>チーム概要</h2>

        <div class="team-dashboard-grid">

            <div class="team-dashboard-card"
                 th:each="team : ${teams}">

                <h3 th:text="${team.name}">
                </h3>

                <p>
                    ユーザー数：
                    <span th:text="${teamUsers[team.id].size()}">
        </span>
                </p>

                <div style="margin-top:12px;">

                    <div style="margin-top:10px; color:#666;">

                        <span th:each="user, stat : ${teamUsers[team.id]}">

                        <span th:text="${user.username}"></span>
                            <span th:if="${!stat.last}">
                              ,
                            </span>

                        </span>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
