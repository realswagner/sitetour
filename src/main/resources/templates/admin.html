
<!DOCTYPE html> <html xmlns:th="http://www.thymeleaf.org"> <head> <title>Admin Dashboard</title> <link rel="stylesheet" th:href="@{/css/style.css}"> </head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">

    <h1 class="page-title">
        管理者パネル
    </h1>

    <div class="section-card">

        <h2>チーム作成</h2>

        <form action="/admin/teams/create" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <div class="form-group">
                <label>チーム名</label>
                <input type="text"
                       name="teamName"
                       required>
            </div>

            <div class="form-group">
                <label>ログインID</label>
                <input type="text"
                       name="username"
                       required>
            </div>

            <div class="form-group">
                <label>パスワード</label>
                <input type="password"
                       name="password"
                       required>
            </div>

            <button type="submit"
                    class="logout-btn">
                チーム作成
            </button>

        </form>

    </div>

    <div class="section-card">

        <h2>チーム一覧</h2>

        <table class="employee-table">

            <thead>

            <tr>
                <th>ID</th>
                <th>チーム名</th>
                <th>操作</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="team : ${teams}">

                <td th:text="${team.id}"></td>

                <td th:text="${team.name}"></td>

                <td>

                    <form action="/admin/teams/delete"
                          method="post"
                          onsubmit="return confirm('チームを削除しますか？');">

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />

                        <input type="hidden"
                               name="id"
                               th:value="${team.id}" />

                        <button type="submit"
                                class="logout-btn">
                            削除
                        </button>

                    </form>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
