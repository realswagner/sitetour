<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Employee</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container">
    <div th:if="${errorMessage}"
         class="error-banner"
         th:text="${errorMessage}">
    </div>

    <div th:if="${successMessage}"
         class="success-banner"
         th:text="${successMessage}">
    </div>

    <div class="section-card form-container">

        <h1 class="page-title">
            社員編集
        </h1>

        <form th:action="@{/employees/update}" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <input type="hidden"
                   name="id"
                   th:value="${employee.id}">

            <label>名前</label>
            <input type="text"
                   name="name"
                   th:value="${employee.name}" required>
            <br><br>

            <label>メール</label>
            <input type="text"
                   name="email"
                   th:value="${employee.email}">
            <br><br>

            <label>電話番号</label>
            <input type="text"
                   name="phoneNumber"
                   th:value="${employee.phoneNumber}">
            <br><br>

            <label>現場</label>
            <input type="text"
                   name="siteLocation"
                   th:value="${employee.siteLocation}">
            <br><br>

            <label>状況</label>
            <select name="status">

                <option value="NOT_CONTACTED"
                        th:selected="${employee.status.name() == 'NOT_CONTACTED'}">
                    Not Contacted
                </option>

                <option value="CONTACTING"
                        th:selected="${employee.status.name() == 'CONTACTING'}">
                    Contacting
                </option>

                <option value="AWAITING_REPLY"
                        th:selected="${employee.status.name() == 'AWAITING_REPLY'}">
                    Awaiting Reply
                </option>

                <option value="SCHEDULED"
                        th:selected="${employee.status.name() == 'SCHEDULED'}">
                    Scheduled
                </option>

                <option value="COMPLETED"
                        th:selected="${employee.status.name() == 'COMPLETED'}">
                    Completed
                </option>

            </select>

            <br><br>

            <label>候補日/メモ</label>
            <br>
            <textarea name="proposedDates"
                      rows="4"
                      cols="50"
                      th:text="${employee.proposedDates}">
    </textarea>

            <br><br>

            <label>インタビュー日</label>
            <input type="date"
                   name="interviewDate"
                   th:value="${employee.interviewDate}">

            <br><br>

            <label>インタビュー時間</label>

            <select name="interviewTime">

                <option value="">-- Select Time --</option>

                <option value="09:00"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '09:00'}">09:00</option>

                <option value="09:30"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '09:30'}">09:30</option>

                <option value="10:00"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '10:00'}">10:00</option>

                <option value="10:30"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '10:30'}">10:30</option>

                <option value="11:00"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '11:00'}">11:00</option>

                <option value="11:30"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '11:30'}">11:30</option>

                <option value="12:00"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '12:00'}">12:00</option>

                <option value="12:30"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '12:30'}">12:30</option>

                <option value="13:00"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '13:00'}">13:00</option>

                <option value="13:30"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '13:30'}">13:30</option>

                <option value="14:00"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '14:00'}">14:00</option>

                <option value="14:30"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '14:30'}">14:30</option>

                <option value="15:00"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '15:00'}">15:00</option>

                <option value="15:30"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '15:30'}">15:30</option>

                <option value="16:00"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '16:00'}">16:00</option>

                <option value="16:30"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '16:30'}">16:30</option>

                <option value="17:00"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '17:00'}">17:00</option>

                <option value="17:30"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '17:30'}">17:30</option>

                <option value="18:00"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '18:00'}">18:00</option>

                <option value="18:30"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '18:30'}">18:30</option>

                <option value="19:00"
                        th:selected="${employee.interviewTime != null && employee.interviewTime.toString() == '19:00'}">19:00</option>

            </select>

            <br><br>

            <label>Zoom URL</label>
            <input type="text"
                   name="zoomLink"
                   size="60"
                   th:value="${employee.zoomLink}">

            <br><br>

            <button type="submit"
                    class="logout-btn">
                保存
            </button>

        </form>

    </div>

</div>


</body>
</html>
