version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: sitetour-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: sitetour
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:

    build: .

    container_name: sitetour-app

    restart: unless-stopped

    depends_on:
      - postgres

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sitetour
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123

    ports:
      - "8080:8080"

volumes:

  postgres-data: