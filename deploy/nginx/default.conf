limit_req_zone $binary_remote_addr zone=sitetour_limit:10m rate=15r/s;

server {
    listen 80;
    server_name realswagner.dev sitetour.realswagner.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name realswagner.dev sitetour.realswagner.dev;

    ssl_certificate /etc/letsencrypt/live/realswagner.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/realswagner.dev/privkey.pem;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;

    client_max_body_size 10M;

    location / {
        limit_req zone=sitetour_limit burst=35 nodelay;

        proxy_pass http://app:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}